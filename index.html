<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="styles.css">

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <div class="card">
      <img class="card__img" src="images/image-product-mobile.jpg" alt="Product Image"></img>
      <section class="card__category">Perfume</section>
      <h2 class="card__title">Gabrielle Essence Eau De Parfum</h2>
      <p class="card__description">A floral, solar and voluptuous
        interpretation composed by Olivier Polge, Perfumer-Creator for the House of
        CHANEL.</p>
      <section class="card__price">
        <div class="card__price-current">$149.99</div>
        <div class="card__price-original">$169.99</div>
      </section>
      <button class="card__button"> <img src="images/icon-cart.svg" alt="">Add to Cart</button>
    </div>
         
  </body>
</html>
